apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

nameSuffix: -staging

patches:
  - target:
      kind: Deployment
      name: demo-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: demo-api-config
    patch: |-
      - op: replace
        path: /data/SERVICE_NAME
        value: cloudnative-demo-api-staging
