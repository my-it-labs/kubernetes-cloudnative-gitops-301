apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-demo-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/my-it-labs/kubernetes-cloudnative-gitops-301.git
    targetRevision: main
    path: infra/kustomize/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudnative-lab-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
